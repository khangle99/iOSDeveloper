<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Portfolio of Le Duy Khang - iOS Developer specializing in Swift, UIKit, SwiftUI, and high-performance native apps.">
    <title>Le Duy Khang | iOS Developer</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="#hero" class="logo">Khang<span>.iOS</span></a>
            <button class="mobile-menu-btn" aria-label="Toggle navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="#" id="download-cv" class="btn-download" download>Download CV</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="hero" class="hero-section">
        <div class="container hero-content" id="hero-container">
            <!-- Loaded dynamically -->
        </div>
    </section>

    <!-- About Section -->
    <section id="about" class="section about-section">
        <div class="container">
            <h2 class="section-title">About Me</h2>
            <div id="about-content" class="about-content">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Featured Projects Section -->
    <section id="projects" class="section projects-section">
        <div class="container">
            <h2 class="section-title">Featured Projects</h2>
            <div class="carousel-container">
                <div class="carousel-track">
                    <!-- Projects are loaded dynamically from assets/projects/{id}/info.json -->
                </div>

                <!-- Carousel Controls -->
                <div class="carousel-nav">
                    <button class="nav-btn prev" aria-label="Previous Project"><i
                            class="fas fa-chevron-left"></i></button>
                    <div class="carousel-dots"></div>
                    <button class="nav-btn next" aria-label="Next Project"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
        <div id="experience" class="container">
            <h2 class="section-title">Work Experience</h2>
            <div id="experience-timeline" class="timeline">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="section skills-section">
        <div class="container">
            <h2 class="section-title">Technical Skills</h2>
            <div id="skills-grid" class="skills-grid">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Education Section -->
    <section id="education" class="section education-section">
        <div class="container">
            <h2 class="section-title">Education & Certifications</h2>
            <div id="education-grid" class="education-grid">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section contact-section">
        <div class="container">
            <div class="contact-box">
                <h2 class="section-title">Let's Work Together</h2>
                <div id="contact-content">
                    <!-- Loaded dynamically -->
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Le Duy Khang. All rights reserved.</p>
        </div>
    </footer>

    <!-- Project Content (Loaded as scripts to avoid CORS issues locally) -->
    <script src="assets/projects/gotyme/content.js"></script>
    <script src="assets/projects/wifiesta/content.js"></script>
    <script src="assets/projects/hifpt/content.js"></script>
    <script src="assets/projects/shimauma/content.js"></script>
    <script src="assets/projects/kaka/content.js"></script>

    <!-- Section Content (Loaded as scripts to avoid CORS issues locally) -->
    <script src="assets/contents/hero/content.js"></script>
    <script src="assets/contents/about/content.js"></script>
    <script src="assets/contents/experience/content.js"></script>
    <script src="assets/contents/skills/content.js"></script>
    <script src="assets/contents/education/content.js"></script>
    <script src="assets/contents/contact/content.js"></script>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>

</html>
